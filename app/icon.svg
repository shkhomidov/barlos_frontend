<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .stroke { stroke: #1A7F4B; }
    .fill   { fill:   #FFFFFF; }
    .accent { fill:   #1A7F4B; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #3DD68C; }
      .fill   { fill:   #0D1117; }
      .accent { fill:   #3DD68C; }
    }
  </style>
  <g class="stroke fill" stroke-width="3.5">
    <circle cx="50" cy="30" r="14" />
    <circle cx="70" cy="65" r="14" />
    <circle cx="30" cy="65" r="14" />
  </g>
  <rect class="accent" x="47" y="52" width="6" height="6" transform="rotate(45 50 55)" />
</svg>
